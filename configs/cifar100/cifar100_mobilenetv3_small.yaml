workers: 2
device: "cuda"
seed: 42

cudnn:
  benchmark: true
  deterministic: true
  enabled: true

data:
  name: cifar100
  input_w: 224
  input_h: 224
  cls: ['apple', 'aquarium_fish', 'baby', 'bear', 'beaver', 'bed', 'bee', 'beetle', 'bicycle', 'bottle', 'bowl', 'boy', 'bridge', 'bus', 'butterfly', 'camel', 'can', 'castle', 'caterpillar', 'cattle', 'chair', 'chimpanzee', 'clock', 'cloud', 'cockroach', 'couch', 'crab', 'crocodile', 'cup', 'dinosaur', 'dolphin', 'elephant', 'flatfish', 'forest', 'fox', 'girl', 'hamster', 'house', 'kangaroo', 'keyboard', 'lamp', 'lawn_mower', 'leopard', 'lion', 'lizard', 'lobster', 'man', 'maple_tree', 'motorcycle', 'mountain', 'mouse', 'mushroom', 'oak_tree', 'orange', 'orchid', 'otter', 'palm_tree', 'pear', 'pickup_truck', 'pine_tree', 'plain', 'plate', 'poppy', 'porcupine', 'possum', 'rabbit', 'raccoon', 'ray', 'road', 'rocket', 'rose', 'sea', 'seal', 'shark', 'shrew', 'skunk', 'skyscraper', 'snail', 'snake', 'spider', 'squirrel', 'streetcar', 'sunflower' , 'sweet_pepper', 'table', 'tank', 'telephone', 'television', 'tiger', 'tractor', 'train', 'trout', 'tulip', 'turtle', 'wardrobe', 'whale', 'willow_tree', 'wolf', 'woman', 'worm']
  train_path: ./data/cifar100/train
  val_path: ./data/cifar100/val
  test_path: ./data/cifar100/val
  img_ext: [".jpg",]
  augmentation:
    policy_type: "trivial"

    random_resized_crop:
      enabled: true
      scale: [0.6, 1.0]
      ratio: [0.9, 1.1]

    horizontal_flip_p: 0.5
    vertical_flip_p: 0.0

    random_rotation:
      prob: 0.15
      degrees: 15

    color_jitter:
      prob: 0.2
      args:
        brightness: 0.3
        contrast: 0.3
        saturation: 0.3

    gaussian_blur:
      prob: 0.1
      args:
        kernel_size: 3
        sigma: [0.1, 2.0]

    solarize:
      prob: 0.05
      threshold: 128

    equalize:
      prob: 0.05

    random_erasing:
      prob: 0.25
      args:
        scale: [0.02, 0.25]
        value: "random"

    cutmix_mixup:
      prob: 0.5
model:
  backbone:
    name: mobilenetv3
    mobilenetv3:
      size: small
      pretrained: true
  neck:
    name: gap
    gap:
  head:
    name: stacked_linear
    stacked_linear:
      hidden_channel: 1024  # 1024 - small, 1280 - large
      activation: hardswish
      dropout_rate: 0.2
train:
  ema:
    decay_rate: 0.999
  compile: default
  amp: true
  save_all_epochs: false
  auto_resume: true
  pretrained:
  epochs: 30
  batch_size: 64
  freeze:
  - backbone
  unfreeze_after: 3
  optimizer:
    name: adamw
    adamw:
      lr: 0.001
      weight_decay: 0.0001
    backbone_lr_mult: 0.01
  lr_scheduler:
    name: cosine
    warmup: 3
    cosine:
      cycles: 0.5
  loss:
    name: ce
    ce:
      weighted: false
  early_stop:

test:
  metric: accuracy
  batch_size: 32
