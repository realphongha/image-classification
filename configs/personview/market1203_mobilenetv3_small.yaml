gpus: "1"
workers: 2
device: "cuda"
seed: 42

cudnn:
  benchmark: true
  deterministic: true
  enabled: true

data:
  name: market1203_personview
  input_w: 128
  input_h: 256
  cls: ['front', 'side', 'back']
  train_path:
  - /home/phonghh/datasets/prj33/Market1203_orient_3classes_split/train
  val_path:
  - /home/phonghh/datasets/prj33/Market1203_orient_3classes_split/val
  test_path:
  - /home/phonghh/datasets/prj33/Market1203_orient_3classes_split/val
  img_ext: [".jpg",]
  augmentation:
    policy_type: "trivial"

    random_resized_crop:
      enabled: false
      scale: [0.6, 1.0]
      ratio: [0.9, 1.1]

    horizontal_flip_p: 0.5
    vertical_flip_p: 0.0

    random_rotation:
      prob: 0.15
      degrees: 15

    color_jitter:
      prob: 0.2
      args:
        brightness: 0.3
        contrast: 0.3
        saturation: 0.3

    gaussian_blur:
      prob: 0.1
      args:
        kernel_size: 3
        sigma: [0.1, 2.0]

    solarize:
      prob: 0.05
      threshold: 128

    equalize:
      prob: 0.05

    random_erasing:
      prob: 0.25
      args:
        scale: [0.02, 0.25]
        value: "random"

    cutmix_mixup:
      prob: 0.5
model:
  backbone:
    name: mobilenetv3
    mobilenetv3:
      size: small
      pretrained: true
  neck:
    name: gap
    gap:
  head:
    name: stacked_linear
    stacked_linear:
      hidden_channel: 1024  # 1024 - small, 1280 - large
      activation: hardswish
      dropout_rate: 0.2
train:
  ema:
    decay_rate: 0.999
  compile: default
  amp: true
  save_all_epochs: false
  auto_resume: true
  pretrained:
  epochs: 30
  batch_size: 64
  freeze:
  unfreeze_after:
  optimizer:
    name: adamw
    adamw:
      lr: 0.001
      weight_decay: 0.0001
    backbone_lr_mult: 0.01
  lr_scheduler:
    name: cosine
    warmup: 3
    cosine:
      cycles: 0.5
  loss:
    name: ce
    ce:
      weighted: false
  early_stop:

test:
  metric: accuracy
  batch_size: 32
